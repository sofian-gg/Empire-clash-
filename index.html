<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Empire Clash | Imperial Military Archives</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'IM Fell English', serif; background: #0f0c08 url('https://www.transparenttextures.com/patterns/dark-rock.png'); color: #dcdcdc; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .container { background: rgba(25, 20, 15, 0.98); padding: 30px; width: 100%; max-width: 500px; border: 4px solid #8c734c; text-align: center; box-shadow: 0 0 50px rgba(0,0,0,0.8); position: relative; }
        h1 { font-family: 'Cinzel', serif; color: #c9a063; letter-spacing: 3px; margin-bottom: 5px; text-transform: uppercase; }
        .subtitle { font-family: 'Cinzel', serif; color: #8c734c; font-size: 0.8rem; margin-bottom: 25px; border-bottom: 1px solid #c9a063; display: inline-block; padding-bottom: 5px; }
        
        .tabs { display: flex; gap: 10px; margin-bottom: 25px; }
        .tab-btn { flex: 1; padding: 12px; background: #1a1510; border: 1px solid #5c4a31; color: #8c734c; cursor: pointer; font-family: 'Cinzel', serif; font-size: 0.7rem; }
        .tab-btn.active { background: #8c734c; color: #1a1510; font-weight: bold; }
        
        .section { display: none; text-align: left; animation: fadeIn 0.5s ease; }
        .section.active { display: block; }

        .search-container { position: relative; width: 100%; }
        input { width: 100%; padding: 12px; background: #120f0a; border: 1px solid #5c4a31; color: #f0e68c; font-family: 'Cinzel', serif; margin-top: 5px; box-sizing: border-box; outline: none; }
        
        .suggestions-list { position: absolute; top: 100%; left: 0; width: 100%; background: #1a1510; border: 1px solid #8c734c; border-top: none; z-index: 10; display: none; max-height: 150px; overflow-y: auto; }
        .suggestion-item { padding: 10px; color: #c9a063; cursor: pointer; font-size: 0.85rem; border-bottom: 1px solid rgba(140, 115, 76, 0.2); }
        .suggestion-item:hover { background: #8c734c; color: #1a1510; }

        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .full-width { grid-column: span 2; }
        label { font-family: 'Cinzel', serif; color: #c9a063; font-size: 0.65rem; margin-top: 10px; text-transform: uppercase; display: block; }
        
        .submit-btn { width: 100%; padding: 15px; margin-top: 20px; background: linear-gradient(45deg, #8c734c, #5c4a31); color: #1a1510; border: 1px solid #c9a063; font-family: 'Cinzel', serif; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        
        .verified-card { background: rgba(0,0,0,0.5); border: 2px solid #c9a063; padding: 20px; margin-top: 20px; }
        .stat-line { display: flex; justify-content: space-between; border-bottom: 1px solid rgba(140,115,76,0.3); padding: 6px 0; }
        .stat-label { color: #8c734c; font-size: 0.75rem; }
        .stat-value { color: #f0e68c; font-weight: bold; }
        
        .footer { margin-top: 30px; border-top: 1px solid #5c4a31; padding-top: 15px; text-align: center; }
        .discord-link { color: #c9a063; text-decoration: none; font-family: 'Cinzel', serif; font-weight: bold; font-size: 0.9rem; }
        .status-badge { font-size: 0.65rem; color: #8c734c; margin-top: 10px; display: block; letter-spacing: 1px; }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="container">
    <h1>Empire Clash</h1>
    <div class="subtitle">Imperial Military Archives</div>

    <div class="tabs">
        <button class="tab-btn active" id="btnSearch" onclick="showSection('search')">Search</button>
        <button class="tab-btn" id="btnSubmit" onclick="showSection('submit')">Submit/Update</button>
    </div>

    <div id="searchSection" class="section active">
        <div class="search-container">
            <input type="text" id="searchName" placeholder="Enter Soldier Name..." oninput="handleAutocomplete()" autocomplete="off">
            <div id="suggestions" class="suggestions-list"></div>
        </div>
        <span id="loadMsg" class="status-badge">🛡️ Connecting to Imperial Database...</span>
        <button class="submit-btn" onclick="searchSoldier()">Search Archives</button>
        
        <div id="searchResult" style="display:none;">
            <div class="verified-card" id="statsOutput"></div>
        </div>
    </div>

    <div id="submitSection" class="section">
        <div class="form-grid">
            <div class="full-width"><label>Roblox Username</label><input type="text" id="subName"></div>
            <div><label>Kills</label><input type="text" id="subKills"></div>
            <div><label>Deaths</label><input type="text" id="subDeaths"></div>
            <div><label>Gold</label><input type="text" id="subGold"></div>
            <div><label>Crowns</label><input type="text" id="subCrowns"></div>
            <div><label>Wins</label><input type="text" id="subWins"></div>
            <div><label>Losses</label><input type="text" id="subLosses"></div>
            <div><label>Time</label><input type="text" id="subTime"></div>
            <div><label>Buried</label><input type="text" id="subBuried"></div>
            <div class="full-width"><label>Proof (ImgBB URL)</label><input type="text" id="subProof"></div>
        </div>
        <button class="submit-btn" id="finalSubmitBtn" onclick="handleDispatch()">Submit Dispatch</button>
        <p id="msg" style="color: #4CAF50; font-size: 0.8rem; text-align: center; margin-top: 10px; display: none;">📜 Dispatch sent to the Elders!</p>
    </div>

    <div class="footer">
        <a href="https://discord.gg/x4djQaBpnQ" target="_blank" class="discord-link">🏰 JOIN OUR DISCORD SERVER</a>
    </div>
</div>

<script>
    const SHEET_ID = '1oQ4GC7sTXCikDYdQLY96CwPSUaeIoOJ3x6mYUjlZuYI';
    const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;
    const WEBHOOK_URL = "https://discord.com/api/webhooks/1482907096134455348/w5K5LenWpbxAQ3-WfIHO6UumW4-KdkQqoEg1MeuYSwy22D3aPkM_cxts0C8ngngfUfFp";

    let verifiedSoldiers = {};

    function showSection(id) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id + 'Section').classList.add('active');
        document.getElementById(id === 'search' ? 'btnSearch' : 'btnSubmit').classList.add('active');
    }

    async function fetchStats() {
        try {
            const response = await fetch(SHEET_URL);
            const text = await response.text();
            const json = JSON.parse(text.substr(47).slice(0, -2));
            const rows = json.table.rows;
            verifiedSoldiers = {};
            rows.forEach(row => {
                const name = row.c[0]?.v?.toString().toLowerCase();
                if (name && name !== "name") {
                    verifiedSoldiers[name] = {
                        kills: row.c[1]?.v || "0", deaths: row.c[2]?.v || "0",
                        gold: row.c[3]?.v || "0", crowns: row.c[4]?.v || "0",
                        wins: row.c[5]?.v || "0", losses: row.c[6]?.v || "0",
                        time: row.c[7]?.v || "0", buried: row.c[8]?.v || "0"
                    };
                }
            });
            document.getElementById('loadMsg').innerText = "🛡️ Archives Synchronized Successfully";
        } catch (e) {
            document.getElementById('loadMsg').innerText = "⚠️ Offline Mode - Local Archives Only";
        }
    }

    fetchStats();

    function handleAutocomplete() {
        const input = document.getElementById('searchName').value.toLowerCase();
        const suggestionsBox = document.getElementById('suggestions');
        suggestionsBox.innerHTML = '';
        if (input.length < 1) { suggestionsBox.style.display = 'none'; return; }
        const matches = Object.keys(verifiedSoldiers).filter(name => name.includes(input));
        if (matches.length > 0) {
            suggestionsBox.style.display = 'block';
            matches.forEach(name => {
                const div = document.createElement('div');
                div.classList.add('suggestion-item');
                div.innerText = name;
                div.onclick = function() {
                    document.getElementById('searchName').value = name;
                    suggestionsBox.style.display = 'none';
                    searchSoldier();
                };
                suggestionsBox.appendChild(div);
            });
        } else { suggestionsBox.style.display = 'none'; }
    }

    function searchSoldier() {
        const nameInput = document.getElementById('searchName').value.trim().toLowerCase();
        const data = verifiedSoldiers[nameInput];
        const resDiv = document.getElementById('searchResult');
        const output = document.getElementById('statsOutput');
        if(data) {
            resDiv.style.display = 'block';
            output.innerHTML = `<div class="stat-line"><span class="stat-label">SOLDIER:</span><span class="stat-value" style="color:#c9a063">${nameInput.toUpperCase()}</span></div>` + 
            Object.keys(data).map(k => `<div class="stat-line"><span class="stat-label">${k.toUpperCase()}:</span><span class="stat-value">${data[k]}</span></div>`).join('');
        } else { alert("Not found in current records."); }
    }

    function handleDispatch() {
        const name = document.getElementById('subName').value;
        const proof = document.getElementById('subProof').value;
        if (!name || !proof) return alert("Soldier Name and Proof are required!");
        
        const btn = document.getElementById('finalSubmitBtn');
        btn.innerText = "Dispatching..."; btn.disabled = true;
        
        const val = (id) => document.getElementById(id).value.trim() || "0";
        const fields = [
            { name: "Soldier", value: name, inline: true },
            { name: "Kills", value: val('subKills'), inline: true },
            { name: "Deaths", value: val('subDeaths'), inline: true },
            { name: "Gold", value: val('subGold'), inline: true },
            { name: "Crowns", value: val('subCrowns'), inline: true },
            { name: "Wins", value: val('subWins'), inline: true },
            { name: "Losses", value: val('subLosses'), inline: true },
            { name: "Time", value: val('subTime'), inline: true },
            { name: "Buried", value: val('subBuried'), inline: true },
            { name: "Proof", value: proof }
        ];

        fetch(WEBHOOK_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ embeds: [{ title: "⚔️ New Statistics Update", color: 13213795, fields: fields, timestamp: new Date() }] })
        }).then(() => {
            document.getElementById('msg').style.display = 'block';
            document.querySelectorAll('#submitSection input').forEach(i => i.value = "");
            btn.innerText = "Submit Dispatch"; btn.disabled = false;
        });
    }

    document.addEventListener('click', (e) => {
        if (!e.target.closest('.search-container')) {
            document.getElementById('suggestions').style.display = 'none';
        }
    });
</script>
</body>
</html>
